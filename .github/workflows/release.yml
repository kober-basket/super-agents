name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Windows runtime
        run: |
          node scripts/install-runtime.mjs --platform win32 --arch x64
          node scripts/install-runtime.mjs --platform win32 --arch arm64

      - name: Build installers
        run: npm run package:runtime:win

      - name: Collect Windows assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Get-ChildItem -Path release -File |
            Where-Object {
              $_.Name -match '\.(exe|blockmap|yml)$' -and
              $_.Name -notmatch '^builder-debug\.yml$'
            } |
            Copy-Item -Destination artifacts

      - name: Upload Windows assets
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: artifacts/*
          if-no-files-found: error

  build-macos:
    name: Build macOS images
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install macOS runtime
        run: |
          node scripts/install-runtime.mjs --platform darwin --arch arm64
          node scripts/install-runtime.mjs --platform darwin --arch x64

      - name: Check macOS runtime
        run: |
          SUPER_AGENTS_RUNTIME_PLATFORM=darwin SUPER_AGENTS_RUNTIME_ARCH=arm64 node scripts/check-runtime.mjs
          SUPER_AGENTS_RUNTIME_PLATFORM=darwin SUPER_AGENTS_RUNTIME_ARCH=x64 node scripts/check-runtime.mjs

      - name: Build images
        run: |
          npm run build
          npx electron-builder --mac --x64 --arm64 --publish never

      - name: Collect macOS assets
        run: |
          mkdir -p artifacts
          find release -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.blockmap" -o -name "*.yml" \) \
            ! -name "builder-debug.yml" \
            -exec cp {} artifacts/ \;

      - name: Upload macOS assets
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    env:
      HAS_RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download assets
        uses: actions/download-artifact@v5
        with:
          path: dist-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist-assets
          sha256sum * > SHA256SUMS.txt

      - name: Import signing key
        if: ${{ env.HAS_RELEASE_SIGNING_KEY == 'true' }}
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.gnupg
          printf "%s" "$RELEASE_SIGNING_PRIVATE_KEY" | gpg --batch --import

      - name: Sign assets
        if: ${{ env.HAS_RELEASE_SIGNING_KEY == 'true' }}
        env:
          RELEASE_SIGNING_KEY_ID: ${{ secrets.RELEASE_SIGNING_KEY_ID }}
          RELEASE_SIGNING_PASSPHRASE: ${{ secrets.RELEASE_SIGNING_PASSPHRASE }}
        run: |
          cd dist-assets
          gpg_args=(--batch --yes --armor --detach-sign)
          if [ -n "$RELEASE_SIGNING_PASSPHRASE" ]; then
            gpg_args+=(--pinentry-mode loopback --passphrase "$RELEASE_SIGNING_PASSPHRASE")
          fi
          for file in *; do
            [ -f "$file" ] || continue
            [ "$file" = "SHA256SUMS.txt" ] && continue
            if [ -n "$RELEASE_SIGNING_KEY_ID" ]; then
              gpg "${gpg_args[@]}" --local-user "$RELEASE_SIGNING_KEY_ID" "$file"
            else
              gpg "${gpg_args[@]}" "$file"
            fi
          done
          if [ -n "$RELEASE_SIGNING_KEY_ID" ]; then
            gpg "${gpg_args[@]}" --local-user "$RELEASE_SIGNING_KEY_ID" SHA256SUMS.txt
          else
            gpg "${gpg_args[@]}" SHA256SUMS.txt
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" dist-assets/* --clobber
